<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubai Marina RP — Development Roadmap</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0f11;
  --surface: #16181c;
  --surface-2: #1e2127;
  --border: #2a2d35;
  --border-hover: #3e4250;
  --text-primary: #e8e9ec;
  --text-secondary: #7a7f8e;
  --text-muted: #4a4f5e;

  --civic-bg: #0d1e30;
  --civic-color: #4a9ede;
  --commercial-bg: #1a1030;
  --commercial-color: #9b8ef0;
  --residential-bg: #0d2419;
  --residential-color: #3fb87a;
  --underground-bg: #2a1010;
  --underground-color: #e06060;

  --phase1-bg: #152a0a;
  --phase1-color: #6dba2d;
  --phase2-bg: #0d1e30;
  --phase2-color: #4a9ede;
  --phase3-bg: #1e1e1e;
  --phase3-color: #8a8a8a;

  --done-bg: #0f1f0f;
  --done-border: #2a4a2a;
  --done-text: #3a5a3a;
  --done-tag: #1e3a1e;
}

body {
  font-family: 'Syne', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  padding: 2.5rem 2rem;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(74,158,222,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(155,142,240,0.04) 0%, transparent 60%);
}

h1 {
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 0.2rem;
}

.subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 2rem;
  letter-spacing: 0.01em;
}

/* Summary bar */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 1.75rem;
}
.stat {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.stat-num {
  font-size: 22px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.03em;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
}
.stat.done-stat .stat-num { color: var(--residential-color); }

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 1.75rem;
  align-items: center;
}
.filter-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 0.5px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.02em;
}
.filter-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
.filter-btn.active { background: var(--surface-2); color: var(--text-primary); border-color: var(--border-hover); }
.filter-btn.done-btn.active { background: var(--done-bg); color: var(--residential-color); border-color: var(--done-border); }

/* Tier */
.tier { margin-bottom: 2.5rem; }
.tier-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 0.5px solid var(--border);
}
.tier-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.02em;
}
.tier-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  margin-left: auto;
}

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }

/* Card */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 15px;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.card:hover { border-color: var(--border-hover); }
.card.expanded { border-color: #3e4250; }

/* Done state */
.card.done {
  background: var(--done-bg);
  border-color: var(--done-border);
}
.card.done .card-name { color: var(--done-text); text-decoration: line-through; }
.card.done .card-original { color: #2a3a2a; }
.card.done .card-tag { filter: saturate(0.2) brightness(0.5); }
.card.done .expand-icon { opacity: 0.3; }
.card.done .req-list li { color: var(--done-text); }
.card.done::after {
  content: '✓';
  position: absolute;
  top: 12px;
  right: 38px;
  font-size: 13px;
  color: var(--residential-color);
  opacity: 0.8;
}

/* Card internals */
.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.card-names { flex: 1; }
.card-original {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 2px;
  letter-spacing: 0.03em;
}
.card-name { font-size: 13px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.01em; }
.card-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  margin-top: 5px;
  display: inline-block;
  letter-spacing: 0.02em;
}

.card-controls {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
}
.expand-icon {
  font-size: 10px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 2px;
}
.done-toggle {
  font-size: 11px;
  width: 20px;
  height: 20px;
  border-radius: 4px;
  border: 0.5px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.done-toggle:hover { border-color: var(--residential-color); color: var(--residential-color); }
.card.done .done-toggle {
  border-color: var(--residential-color);
  color: var(--residential-color);
  background: rgba(63, 184, 122, 0.1);
}

/* Details */
.card-details {
  margin-top: 11px;
  padding-top: 11px;
  border-top: 0.5px solid var(--border);
  display: none;
}
.card.expanded .card-details { display: block; }
.req-list { list-style: none; }
.req-list li {
  font-family: 'DM Mono', monospace;
  font-size: 11.5px;
  color: var(--text-secondary);
  padding: 3px 0;
  display: flex;
  gap: 8px;
  align-items: flex-start;
  letter-spacing: 0.01em;
}
.req-list li::before { content: '—'; color: var(--text-muted); flex-shrink: 0; }

/* Progress bar at top */
.progress-wrap {
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar-bg {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--residential-color);
  border-radius: 10px;
  transition: width 0.3s ease;
  min-width: 0;
}
.progress-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* Empty state */
.empty { 
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
  padding: 2rem;
  text-align: center;
}
</style>
</head>

<p class="subtitle">click to expand · click ✓ button to mark complete · filter by phase or category</p>

<div class="summary-bar">

  { id: 46, original: "Aces", name: "Marina Motorsport Club", phase: "phase3", cat: "commercial", tag: "Leisure", reqs: ["Showroom floor with vehicles", "Small track or test area outside", "Lounge for members", "Vehicle purchase/customization interaction"] },
  { id: 47, original: "LanderWok", name: "Pan-Asian Restaurant — Marina Mall", phase: "phase2", cat: "commercial", tag: "Food", reqs: ["Dining area (10–12 tables)", "Open kitchen", "Asian-themed interior", "Mall frontage"] },
];

const catColors = {
  civic:       { bg: 'var(--civic-bg)',       color: 'var(--civic-color)' },
  commercial:  { bg: 'var(--commercial-bg)',  color: 'var(--commercial-color)' },
  residential: { bg: 'var(--residential-bg)', color: 'var(--residential-color)' },
  underground: { bg: 'var(--underground-bg)', color: 'var(--underground-color)' },
};

const phaseLabels = {
  phase1: { label: 'Phase 1 — core (get to playable)', bg: 'var(--phase1-bg)', color: 'var(--phase1-color)' },
  phase2: { label: 'Phase 2 — economy & world',        bg: 'var(--phase2-bg)', color: 'var(--phase2-color)' },
  phase3: { label: 'Phase 3 — full world completion',  bg: 'var(--phase3-bg)', color: 'var(--phase3-color)' },
};

// State
const done = new Set();
let currentFilter = 'all';

function toggleDone(id, e) {
  e.stopPropagation();
  if (done.has(id)) done.delete(id);
  else done.add(id);
  updateProgress();
  renderCards(currentFilter, true);
}

function toggleCard(id, e) {
  e.stopPropagation();
  const card = document.getElementById('card-' + id);
  card.classList.toggle('expanded');
  card.querySelector('.expand-icon').textContent = card.classList.contains('expanded') ? '▲' : '▼';
}

function updateProgress() {
  const count = done.size;
  document.getElementById('done-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 47 * 100) + '%';
  document.getElementById('progress-label').textContent = count + ' / 47';
}

function filterCards(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(filter);
}

function renderCards(filter, preserveExpanded) {
  const container = document.getElementById('cards-container');

  // Save expanded state
  const expanded = new Set();
  if (preserveExpanded) {
    document.querySelectorAll('.card.expanded').forEach(c => expanded.add(parseInt(c.id.replace('card-', ''))));
  }

  let html = '';

  if (filter === 'done') {
    const doneLocs = locations.filter(l => done.has(l.id));
    if (!doneLocs.length) {
      html = '<div class="empty">No completed locations yet — click ✓ on a card to mark it done.</div>';
    } else {
      html += `<div class="tier"><div class="tier-header"><span class="tier-badge" style="background:var(--done-bg);color:var(--residential-color)">Completed</span><span class="tier-subtitle">${doneLocs.length} locations</span></div><div class="grid">`;
      doneLocs.forEach(loc => { html += buildCard(loc, expanded); });
      html += '</div></div>';
    }
    container.innerHTML = html;
    return;
  }

  const filterPhases = (['phase1','phase2','phase3'].includes(filter)) ? [filter] : ['phase1','phase2','phase3'];
  filterPhases.forEach(phase => {
    let filtered = locations.filter(l => {
      if (filter === 'all') return l.phase === phase;
      if (['phase1','phase2','phase3'].includes(filter)) return l.phase === phase;
      return l.phase === phase && l.cat === filter;
    });
    if (!filtered.length) return;
    const pl = phaseLabels[phase];
    html += `<div class="tier"><div class="tier-header"><span class="tier-badge" style="background:${pl.bg};color:${pl.color}">${pl.label}</span><span class="tier-subtitle">${filtered.length} locations</span></div><div class="grid">`;
    filtered.forEach(loc => { html += buildCard(loc, expanded); });
    html += '</div></div>';
  });

  container.innerHTML = html;
}

function buildCard(loc, expanded) {
  const cc = catColors[loc.cat] || catColors.commercial;
  const isDone = done.has(loc.id);
  const isExpanded = expanded && expanded.has(loc.id);
  return `<div class="card${isDone ? ' done' : ''}${isExpanded ? ' expanded' : ''}" id="card-${loc.id}" onclick="toggleCard(${loc.id}, event)">
    <div class="card-top">
      <div class="card-names">
        <div class="card-original">${loc.original}</div>
        <div class="card-name">${loc.name}</div>
        <span class="card-tag" style="background:${cc.bg};color:${cc.color}">${loc.tag}</span>
      </div>
      <div class="card-controls">
        <button class="done-toggle" onclick="toggleDone(${loc.id}, event)" title="Mark complete">✓</button>
        <span class="expand-icon">${isExpanded ? '▲' : '▼'}</span>
      </div>
    </div>
    <div class="card-details"><ul class="req-list">${loc.reqs.map(r=>`<li>${r}</li>`).join('')}</ul></div>
  </div>`;
}

renderCards('all');
</script>
</body>
</html>
